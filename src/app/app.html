<p-toast />
<p-confirmDialog />

<app-filme-list
  [filmes]="filmes()"
  (incluir)="onIncluir()"
  (detalhar)="onDetalhar($event)"
  (alterar)="onAlterar($event)"
  (remover)="onRemover($event)"
/>

<app-filme-insert
  [(visivel)]="dialogIncluirVisivel"
  (salvo)="onFilmeIncluido($event)"
/>

<app-filme-update
  [(visivel)]="dialogAlterarVisivel"
  [filme]="filmeSelecionado()"
  (salvo)="onFilmeAlterado($event)"
/>

<app-filme-detail
  [(visivel)]="dialogDetalharVisivel"
  [filme]="filmeSelecionado()"
/>
